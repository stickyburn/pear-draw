<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Pear Draw</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
		rel="stylesheet">
	<style>
		:root {
			--nav-snow: #F5F0EB;
			--nav-carbon: #1A1A1A;
			--nav-granite: #4A4A4A;
			--nav-slate: #7A7A7A;
			--nav-ash: #B0B0B0;
			--nav-fjord: #2B4B5B;
			--nav-aurora: #5B8A72;
			--nav-rust: #8B4A3A;
			--nav-ember: #B8864A;
			--nav-frost: #E8E3DD;
			--nav-ice: #DDD8D2;
			--nav-basalt: #2A2A2A;
			--nav-obsidian: #0D0D0D;

			/* Instrument for display, Inter and Jetbrains for elements */
			--font-display: "Instrument Serif", Georgia, serif;
			--font-sans: "Inter", system-ui, sans-serif;
			--font-mono: "JetBrains Mono", monospace;

			--space-1: 4px;
			--space-2: 8px;
			--space-3: 16px;
			--space-4: 24px;
			--space-5: 48px;

			--ease-premium: cubic-bezier(0.22, 1, 0.36, 1);
			--ease-aggressive: cubic-bezier(0.76, 0, 0.24, 1);
			--ease-dramatic: cubic-bezier(0.87, 0, 0.13, 1);
			--ease-gentle: cubic-bezier(0.25, 0.1, 0.25, 1);
			--dur-fast: 150ms;
			--dur-normal: 300ms;
			--dur-slow: 500ms;
			--dur-dramatic: 800ms;
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			padding: 0;
		}

		body {
			font-family: var(--font-sans);
			background: var(--nav-obsidian);
			color: var(--nav-snow);
			min-height: 100vh;
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
		}

		#root {
			width: 100%;
			height: 100%;
		}

		::selection {
			background: var(--nav-carbon);
			color: var(--nav-snow);
		}


		/* Microinteractions */
		@keyframes blur-in {
			0% {
				filter: blur(12px);
				opacity: 0;
			}

			100% {
				filter: blur(0px);
				opacity: 1;
			}
		}

		@keyframes blur-in-subtle {
			0% {
				filter: blur(6px);
				opacity: 0;
			}

			100% {
				filter: blur(0px);
				opacity: 1;
			}
		}

		@keyframes wipe-down {
			0% {
				clip-path: inset(0 0 100% 0);
			}

			100% {
				clip-path: inset(0 0 0% 0);
			}
		}

		@keyframes wipe-up {
			0% {
				clip-path: inset(100% 0 0 0);
			}

			100% {
				clip-path: inset(0% 0 0 0);
			}
		}

		@keyframes wipe-left {
			0% {
				clip-path: inset(0 100% 0 0);
			}

			100% {
				clip-path: inset(0 0% 0 0);
			}
		}

		@keyframes wipe-right {
			0% {
				clip-path: inset(0 0 0 100%);
			}

			100% {
				clip-path: inset(0 0 0 0%);
			}
		}

		@keyframes slide-in-left {
			0% { opacity: 0; transform: translateX(-20px); }
			100% { opacity: 1; transform: translateX(0); }
		}

		@keyframes border-draw {
			0% {
				stroke-dashoffset: 800;
			}

			100% {
				stroke-dashoffset: 0;
			}
		}

		@keyframes dot-grid-pulse {

			0%,
			100% {
				opacity: 0.15;
			}

			50% {
				opacity: 0.25;
			}
		}

		@keyframes loading-bar {
			0% {
				width: 0%;
			}

			60% {
				width: 70%;
			}

			100% {
				width: 100%;
			}
		}

		/* Inputs */
		input[type="range"] {
			-webkit-appearance: none;
			appearance: none;
			background: transparent;
			cursor: pointer;
			width: 100%;
		}

		input[type="range"]::-webkit-slider-track {
			height: 1px;
			background: var(--nav-granite);
			border-radius: 0;
		}

		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			appearance: none;
			width: 10px;
			height: 10px;
			background: var(--nav-snow);
			border: 1px solid var(--nav-carbon);
			border-radius: 0;
			margin-top: -5px;
			transition: background var(--dur-fast) var(--ease-premium);
		}

		input[type="range"]::-webkit-slider-thumb:hover {
			background: var(--nav-aurora);
			border-color: var(--nav-aurora);
		}

		input[type="range"]::-moz-range-track {
			height: 1px;
			background: var(--nav-granite);
			border-radius: 0;
			border: none;
		}

		input[type="range"]::-moz-range-thumb {
			width: 10px;
			height: 10px;
			background: var(--nav-snow);
			border: 1px solid var(--nav-carbon);
			border-radius: 0;
			transition: background var(--dur-fast) var(--ease-premium);
		}

		input[type="range"]::-moz-range-thumb:hover {
			background: var(--nav-aurora);
			border-color: var(--nav-aurora);
		}

		::-webkit-scrollbar {
			width: 4px;
		}

		::-webkit-scrollbar-track {
			background: var(--nav-obsidian);
		}

		::-webkit-scrollbar-thumb {
			background: var(--nav-granite);
		}

		::-webkit-scrollbar-thumb:hover {
			background: var(--nav-ash);
		}

		.nav-dot-grid {
			background-image: radial-gradient(circle, var(--nav-granite) 0.5px, transparent 0.5px);
			background-size: 24px 24px;
			background-position: 12px 12px;
		}
	</style>
</head>

<body>
	<div id="root"></div>
	<script type="module" src="./index.jsx"></script>
</body>

</html>
