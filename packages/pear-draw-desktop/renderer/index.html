<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Pear Draw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════
       TOKYO MIDNIGHT CREATIVE STUDIO - Global Styles
       ═══════════════════════════════════════════════════════════════ */

    :root {
      /* Core palette */
      --void: #050505;
      --abyss: #0a0a0a;
      --midnight: #111111;
      --surface: #161616;
      --elevated: #1e1e1e;
      --floating: #252525;
      
      /* Neon accents */
      --neon-violet: #8b5cf6;
      --neon-cyan: #06b6d4;
      --neon-rose: #f43f5e;
      --neon-amber: #f59e0b;
      --neon-emerald: #10b981;
      
      /* Text hierarchy */
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --text-ghost: #52525b;
      
      /* Utility */
      --border: #27272a;
      --border-glow: #3f3f46;
      
      /* Typography */
      --font-display: "Space Grotesk", "Inter", system-ui, sans-serif;
      --font-sans: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
      
      /* Easings */
      --ease-premium: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-snappy: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-cinematic: cubic-bezier(0.87, 0, 0.13, 1);
      
      /* Durations */
      --dur-instant: 50ms;
      --dur-fast: 150ms;
      --dur-normal: 250ms;
      --dur-slow: 400ms;
      --dur-cinematic: 600ms;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--void);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      width: 100%;
      height: 100%;
    }

    ::selection {
      background: var(--neon-violet);
      color: white;
    }

    /* ═══════════════════════════════════════════════════════════════
       Studio Keyframe Animations
       ═══════════════════════════════════════════════════════════════ */

    @keyframes studio-fade-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes studio-scale-in {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes studio-slide-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes studio-slide-down {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes studio-blur-in {
      0% { opacity: 0; filter: blur(20px); }
      100% { opacity: 1; filter: blur(0); }
    }

    @keyframes studio-clip-reveal {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0% 0 0); }
    }

    @keyframes studio-pulse-glow {
      0%, 100% { box-shadow: 0 0 20px var(--glow-color, var(--neon-violet))30; }
      50% { box-shadow: 0 0 30px var(--glow-color, var(--neon-violet))50, 0 0 60px var(--glow-color, var(--neon-violet))20; }
    }

    @keyframes studio-breathe {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    @keyframes studio-grid-flow {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    @keyframes studio-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes studio-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes studio-bounce-subtle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes studio-spin-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes studio-cursor-trail {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.5); }
    }

    /* ═══════════════════════════════════════════════════════════════
       Canvas Grid Pattern
       ═══════════════════════════════════════════════════════════════ */

    .studio-canvas-grid {
      background-color: var(--void);
      background-image: 
        radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0);
      background-size: 32px 32px;
      background-position: center center;
    }

    .studio-canvas-grid-dense {
      background-color: var(--void);
      background-image: 
        radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0);
      background-size: 32px 32px;
      background-position: center center;
    }

    /* ═══════════════════════════════════════════════════════════════
       Form Elements
       ═══════════════════════════════════════════════════════════════ */

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
      width: 100%;
    }

    input[type="range"]:focus {
      outline: none;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--abyss);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-glow);
    }

    /* Firefox scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--border) var(--abyss);
    }

    /* ═══════════════════════════════════════════════════════════════
       Reduced Motion Support
       ═══════════════════════════════════════════════════════════════ */

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms;
        animation-iteration-count: 1;
        transition-duration: 0.01ms;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./index.jsx"></script>
</body>

</html>
